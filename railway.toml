# Railway config — reference/documentation only.
#
# NOTE: Each bot runs as its OWN Railway service, with its Start Command + Cron
# Schedule configured in the Railway UI (NOT driven by this file). This block
# documents the intended setup so it's recoverable if a service is rebuilt.
#
# Live services (all MEXC, paper trading):
#   v09 crypto      node bot_crypto_v09_mexc.js   0 * * * *           hourly; 4H scan at 0/4/8/12/16/20 UTC
#   DT day-trading  node bot_daytrading_mexc.js   0,15,30,45 * * * *  every 15 min
#   Golden Pocket   node bot_golden_pocket.js     0,15,30,45 * * * *  every 15 min
#   Regime monitor  node bot_regime_monitor.js    0 12 * * *          daily; drives short macro-gate
#   Market pulse    node bot_market_pulse.js      */30 * * * *        every 30 min; conditions + confluence log

[build]
builder = "NIXPACKS"
